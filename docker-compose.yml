# Coolify deployment — single app container (API + SPA on one port).
# Full guide: DEPLOY_COOLIFY.md
# All environment variables are managed in the Coolify UI (Environment Variables tab).
# Do NOT declare secrets here — Coolify injects them into the container,
# and any variable listed in this file gets locked to the compose file.

services:
  gfl-inventory:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
    volumes:
      - gfl_inventory_uploads:/app/uploads
    expose:
      - "4000"
    # Coolify maps your domain → container port 4000 via its proxy.
    # For a bare `docker compose up` locally, uncomment:
    # ports:
    #   - "4000:4000"

volumes:
  gfl_inventory_uploads:
